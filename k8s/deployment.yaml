apiVersion: apps/v1
kind: Deployment
metadata:
  name: guest-list-api
  namespace: default
  labels:
    app: guest-list-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: guest-list-api
  template:
    metadata:
      labels:
        app: guest-list-api
    spec:
      containers:
      - name: guest-list-api
        image: giligalili/guestlistapi:latest
        ports:
        - containerPort: 1111
        env:
        - name: ENVIRONMENT
          value: "${ENVIRONMENT}"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 1111
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 1111
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: guest-list-api-service
  namespace: default
spec:
  selector:
    app: guest-list-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 1111
  type: LoadBalancer
