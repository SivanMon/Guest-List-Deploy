name: Deploy Infrastructure

on:
  push:
    branches:
      - sivan-feature
      - dvir-feature
      - dev
      - stage
      - prod
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'sivan'
        type: choice
        options:
        - sivan
        - dvir
        - dev
        - stage
        - prod
      action:
        description: 'Action'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set Environment
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "ENV=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          echo "ACTION=${{ github.event.inputs.action }}" >> $GITHUB_ENV
        else
          case "${{ github.ref_name }}" in
            "sivan-feature")
              echo "ENV=sivan" >> $GITHUB_ENV
              echo "ACTION=plan" >> $GITHUB_ENV
              ;;
            "dvir-feature")
              echo "ENV=dvir" >> $GITHUB_ENV
              echo "ACTION=plan" >> $GITHUB_ENV
              ;;
            "dev")
              echo "ENV=dev" >> $GITHUB_ENV
              echo "ACTION=apply" >> $GITHUB_ENV
              ;;
            "stage")
              echo "ENV=stage" >> $GITHUB_ENV
              echo "ACTION=plan" >> $GITHUB_ENV
              ;;
            "prod")
              echo "ENV=prod" >> $GITHUB_ENV
              echo "ACTION=plan" >> $GITHUB_ENV
              ;;
          esac
        fi

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets[format('AWS_ACCESS_KEY_ID_{0}', env.ENV)] || secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets[format('AWS_SECRET_ACCESS_KEY_{0}', env.ENV)] || secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2

    # Step 1: Create S3 and DynamoDB for state management
    - name: Bootstrap State Resources
      run: |
        cd bootstrap
        terraform init
        terraform plan -var="environment=${{ env.ENV }}"
        terraform apply -auto-approve -var="environment=${{ env.ENV }}"
        cd ..

    # Step 2: Deploy main infrastructure  
    - name: Terraform Init
      run: |
        cd terraform
        terraform init \
          -backend-config="bucket=guest-list-tfstate-${{ env.ENV }}" \
          -backend-config="key=terraform.tfstate" \
          -backend-config="region=us-west-2" \
          -backend-config="dynamodb_table=guest-list-tfstate-lock-${{ env.ENV }}"

    - name: Terraform Plan
      run: |
        cd terraform
        terraform plan -var-file="../environments/${{ env.ENV }}.tfvars"
        
    - name: Terraform Apply
      if: env.ACTION == 'apply'
      run: |
        cd terraform
        terraform apply -auto-approve -var-file="../environments/${{ env.ENV }}.tfvars"

    - name: Terraform Destroy
      if: env.ACTION == 'destroy'
      run: |
        cd terraform
        terraform destroy -auto-approve -var-file="../environments/${{ env.ENV }}.tfvars"
        # Also destroy bootstrap resources
        cd ../bootstrap
        terraform destroy -auto-approve -var="environment=${{ env.ENV }}"

